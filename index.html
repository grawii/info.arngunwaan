<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkjulieland - Queue Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Mitr', 'sans-serif'],
                        heading: ['Fredoka', 'sans-serif'],
                    },
                    colors: {
                        theme: {
                            bg: '#FAFAFC',
                            card: '#FFFFFF',
                            textDark: '#332E3A',
                            textMuted: '#6B6670',
                            noteBg: '#F3F4F6',
                            btnBg: '#F6F3F9',
                            btnHover: '#EBE5F0',
                            accent: '#FFB6C1',
                            purpleSoft: '#E8D1EE',
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'float': '0 10px 30px rgba(0, 0, 0, 0.06)',
                        'glow': '0 0 15px rgba(253, 176, 192, 0.4)',
                    },
                    animation: {
                        blob: "blob 7s infinite",
                        float: "float 4s ease-in-out infinite",
                        pulseSoft: "pulseSoft 3s ease-in-out infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(20px, -30px) scale(1.05)" },
                            "66%": { transform: "translate(-15px, 15px) scale(0.95)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" },
                        },
                        float: {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-6px)" },
                        },
                        pulseSoft: {
                            "0%, 100%": { opacity: 1, transform: "scale(1)" },
                            "50%": { opacity: 0.8, transform: "scale(0.98)" },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAFAFC;
            color: #332E3A;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
