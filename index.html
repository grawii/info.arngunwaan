<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkjulieland - Queue Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Mitr', 'sans-serif'],
                        heading: ['Fredoka', 'sans-serif'],
                    },
                    colors: {
                        theme: {
                            bg: '#FAFAFC',
                            card: '#FFFFFF',
                            textDark: '#332E3A',
                            textMuted: '#6B6670',
                            noteBg: '#F3F4F6',
                            btnBg: '#F6F3F9',
                            btnHover: '#EBE5F0',
                            accent: '#FFB6C1',
                            purpleSoft: '#E8D1EE',
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.03)',
                        'float': '0 10px 30px rgba(0, 0, 0, 0.06)',
                        'glow': '0 0 15px rgba(253, 176, 192, 0.4)',
                    },
                    animation: {
                        blob: "blob 7s infinite",
                        float: "float 4s ease-in-out infinite",
                        pulseSoft: "pulseSoft 3s ease-in-out infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(20px, -30px) scale(1.05)" },
                            "66%": { transform: "translate(-15px, 15px) scale(0.95)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" },
                        },
                        float: {
                            "0%, 100%": { transform: "translateY(0)" },
                            "50%": { transform: "translateY(-6px)" },
                        },
                        pulseSoft: {
                            "0%, 100%": { opacity: 1, transform: "scale(1)" },
                            "50%": { opacity: 0.8, transform: "scale(0.98)" },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAFAFC;
            color: #332E3A;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body class="antialiased font-sans flex justify-center selection:bg-pink-200 selection:text-pink-900 sm:py-6">

    <main class="w-full max-w-[480px] min-h-screen relative pb-24 bg-white shadow-2xl sm:rounded-[40px] overflow-hidden border border-gray-100 flex flex-col">
        
        <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
            <div class="absolute top-[-5%] left-[-10%] w-[300px] h-[300px] bg-pink-100 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob"></div>
            <div class="absolute top-[40%] right-[-10%] w-[320px] h-[320px] bg-purple-100 rounded-full mix-blend-multiply filter blur-[80px] opacity-60 animate-blob" style="animation-delay: 2s;"></div>
            <div class="absolute bottom-[5%] left-[5%] w-[250px] h-[250px] bg-blue-50 rounded-full mix-blend-multiply filter blur-[70px] opacity-70 animate-blob" style="animation-delay: 4s;"></div>
        </div>

        <div class="relative z-10 flex-1 flex flex-col">
            
            <header class="pt-10 pb-4 px-6 text-center relative">
                <div class="absolute top-8 left-8 text-pink-200 opacity-40 text-2xl font-bold font-heading animate-float pointer-events-none">&lt;/&gt;</div>
                <div class="absolute top-12 right-10 text-purple-200 opacity-40 text-xl font-bold font-heading animate-float pointer-events-none" style="animation-delay: 2s;">{ }</div>

                <h1 class="font-heading text-3xl font-bold text-theme-textDark mb-1 tracking-wide relative inline-block">
                    Pinkjulieland
                    <svg class="absolute -top-2 -right-5 w-5 h-5 animate-pulseSoft" viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 13 9 18 12C13 14 12 22 12 22C12 22 11 14 6 12C11 9 12 2 12 2Z" fill="#FFB6C1"/></svg>
                </h1>
                <h2 class="text-sm font-medium text-theme-textMuted tracking-wider uppercase">Queue Tracking System</h2>
            </header>

            <div id="customerPage" class="tab-content active px-5 space-y-5 flex-1">
                
                <div class="glass-card p-5 rounded-[28px] shadow-soft border border-white/60">
                    <h3 class="font-semibold text-base mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-magnifying-glass text-theme-textMuted bg-gray-100 p-2 rounded-full text-xs"></i> ตรวจสอบสถานะงานของคุณ
                    </h3>
                    <div class="space-y-3">
                        <div class="relative">
                            <input type="text" id="searchTrackInput" placeholder="กรอกรหัสคิว หรือ ชื่อลูกค้า..." class="w-full bg-white/80 border border-gray-200 rounded-2xl py-3.5 pl-11 pr-4 text-sm focus:outline-none focus:border-pink-300 transition-all shadow-inner">
                            <i class="fa-solid fa-fingerprint absolute left-4 top-4.5 text-gray-400"></i>
                        </div>
                        <button onclick="searchQueue()" class="w-full bg-theme-textDark text-white py-3.5 rounded-2xl font-medium text-sm shadow-md hover:bg-[#25212A] active:scale-[0.99] transition-all">
                            ค้นหาข้อมูลคิวงาน
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2.5">
                    <div class="glass-card p-3 rounded-2xl text-center border border-white/60 shadow-soft">
                        <div class="text-xs text-theme-textMuted mb-0.5">คิวทั้งหมด</div>
                        <div id="totalQueueCount" class="font-heading text-xl font-bold text-theme-textDark">3</div>
                    </div>
                    <div class="glass-card p-3 rounded-2xl text-center border border-white/60 shadow-soft">
                        <div class="text-xs text-amber-600 mb-0.5">กำลังทำ</div>
                        <div id="pendingQueueCount" class="font-heading text-xl font-bold text-amber-500 animate-pulse">1</div>
                    </div>
                    <div class="glass-card p-3 rounded-2xl text-center border border-white/60 shadow-soft">
                        <div class="text-xs text-emerald-600 mb-0.5">เสร็จแล้ว</div>
                        <div id="successQueueCount" class="font-heading text-xl font-bold text-emerald-500">2</div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-sm font-semibold text-theme-textDark">รายการคิวงานปัจจุบัน</span>
                        <span class="text-xs text-theme-textMuted" id="queueTimestamp">อัปเดตล่าสุดเรียลไทม์</span>
                    </div>

                    <div id="publicQueueList" class="space-y-3">
                        </div>
                </div>
            </div>

            <div id="adminPage" class="tab-content px-5 space-y-5 flex-1">
                
                <div class="glass-card p-5 rounded-[28px] shadow-soft border border-white/60">
                    <h3 class="font-semibold text-base mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-plus text-theme-textMuted bg-gray-100 p-2 rounded-full text-xs"></i> เพิ่มคิวงานกราฟิกใหม่
                    </h3>
                    <form id="addQueueForm" onsubmit="createNewQueue(event)" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs font-medium text-theme-textMuted block mb-1">รหัสคิว</label>
                                <input type="text" id="formQueueId" placeholder="เช่น PJ-004" required class="w-full bg-white/90 border border-gray-200 rounded-xl p-2.5 text-xs focus:outline-none focus:border-pink-300">
                            </div>
                            <div>
                                <label class="text-xs font-medium text-theme-textMuted block mb-1">ชื่อลูกค้า</label>
                                <input type="text" id="formCustomerName" placeholder="ชื่อ / แฟนเพจ" required class="w-full bg-white/90 border border-gray-200 rounded-xl p-2.5 text-xs focus:outline-none focus:border-pink-300">
                            </div>
                        </div>
                        <div>
                            <label class="text-xs font-medium text-theme-textMuted block mb-1">ประเภทงาน / รายละเอียด</label>
                            <input type="text" id="formJobDetails" placeholder="เช่น เว็บเรทเติมเกมส์ + 2 แบนเนอร์" required class="w-full bg-white/90 border border-gray-200 rounded-xl p-2.5 text-xs focus:outline-none focus:border-pink-300">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-xs font-medium text-theme-textMuted block mb-1">สถานะ</label>
                                <select id="formStatus" class="w-full bg-white/90 border border-gray-200 rounded-xl p-2.5 text-xs focus:outline-none focus:border-pink-300 text-theme-textDark">
                                    <option value="รอคิว">⏳ รอคิว</option>
                                    <option value="กำลังดำเนินงาน">👩‍💻 กำลังดำเนินงาน</option>
                                    <option value="ส่งมอบงานแล้ว">🎉 ส่งมอบงานแล้ว</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-medium text-theme-textMuted block mb-1">กำหนดส่ง (ความเร่ง)</label>
                                <select id="formUrgency" class="w-full bg-white/90 border border-gray-200 rounded-xl p-2.5 text-xs focus:outline-none focus:border-pink-300 text-theme-textDark">
                                    <option value="ปกติ (4-8 ชม.)">ปกติ (4-8 ชม.)</option>
                                    <option value="งานเร่ง (ด่วนพิเศษ)">งานเร่ง (ด่วนพิเศษ)</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="w-full mt-2 bg-purple-600 text-white py-3 rounded-xl font-medium text-xs shadow-md hover:bg-purple-700 transition-all">
                            บันทึกข้อมูลและลงคิวระบบ
                        </button>
                    </form>
                </div>

                <div class="space-y-3">
                    <div class="px-1 flex justify-between items-center">
                        <span class="text-sm font-semibold text-theme-textDark">แผงควบคุมสถานะหลังบ้าน</span>
                        <span class="text-xs text-purple-700 bg-purple-50 px-2 py-0.5 rounded-md font-medium">โหมดผู้ดูแลระบบ</span>
                    </div>
                    
                    <div id="adminQueueList" class="space-y-3">
                        </div>
                </div>

            </div>

            <div class="mt-auto pt-6 flex justify-center opacity-20">
                <svg width="40" height="30" viewBox="0 0 100 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 50 L30 10 L50 35 L70 10 L80 50 Z" fill="#2E2A36"/>
                </svg>
            </div>

        </div>

        <nav class="absolute bottom-4 left-1/2 transform -translate-x-1/2 w-[calc(100%-40px)] bg-theme-textDark/95 backdrop-blur-md py-3 px-6 rounded-2xl flex justify-around items-center shadow-lg z-30">
            <button onclick="switchTab('customer')" id="navCustomerBtn" class="flex flex-col items-center gap-1 text-pink-300 transition-all scale-105">
                <i class="fa-solid fa-list-check text-lg"></i>
                <span class="text-[10px] font-medium">เช็คสถานะคิว</span>
            </button>
            <div class="h-6 w-[1px] bg-white/10"></div>
            <button onclick="switchTab('admin')" id="navAdminBtn" class="flex flex-col items-center gap-1 text-white/50 hover:text-white transition-all">
                <i class="fa-solid fa-sliders text-lg"></i>
                <span class="text-[10px] font-medium">จัดการหลังบ้าน</span>
            </button>
        </nav>

    </main>

    <script>
        // Initial Dummy Data Array
        let queueData = [
            { id: "PJ-001", customer: "คุณ มินท์ คิวท์ป้าย", detail: "เว็บเรทราคารับทำป้ายสไตล์พาสเทล", status: "ส่งมอบงานแล้ว", urgency: "ปกติ (4-8 ชม.)" },
            { id: "PJ-002", customer: "ร้าน GameTopUp", detail: "เว็บเรทราคารับเติมเกมส์ โทนมืดส้มเด่น", status: "กำลังดำเนินงาน", urgency: "งานเร่ง (ด่วนพิเศษ)" },
            { id: "PJ-003", customer: "Goodnote Station Thai", detail: "ออกแบบภาพแบนเนอร์สมุดโน้ตรุ่นพรีเมียม 2 รูป", status: "ส่งมอบงานแล้ว", urgency: "ปกติ (4-8 ชม.)" }
        ];

        // Function to Render Dashboard UI
        function renderSystem() {
            const publicList = document.getElementById('publicQueueList');
            const adminList = document.getElementById('adminQueueList');
            
            // Clear current list content
            publicList.innerHTML = '';
            adminList.innerHTML = '';

            // Counters
            let total = queueData.length;
            let pending = 0;
            let success = 0;

            queueData.forEach((item, index) => {
                // Calculate counters
                if (item.status === "ส่งมอบงานแล้ว") success++;
                else pending++;

                // Set Status Style badges
                let statusBadge = '';
                let statusBg = '';
                if(item.status === "ส่งมอบงานแล้ว") {
                    statusBadge = '<span class="text-[11px] font-medium bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full border border-emerald-100"><i class="fa-solid fa-circle-check mr-1"></i>สำเร็จแล้ว</span>';
                    statusBg = 'border-l-4 border-l-emerald-400';
                } else if(item.status === "กำลังดำเนินงาน") {
                    statusBadge = '<span class="text-[11px] font-medium bg-amber-50 text-amber-700 px-2.5 py-1 rounded-full border border-amber-100 animate-pulse"><i class="fa-solid fa-spinner fa-spin mr-1"></i>กำลังทำ</span>';
                    statusBg = 'border-l-4 border-l-amber-400';
                } else {
                    statusBadge = '<span class="text-[11px] font-medium bg-gray-50 text-gray-600 px-2.5 py-1 rounded-full border border-gray-200"><i class="fa-regular fa-clock mr-1"></i>รอคิว</span>';
                    statusBg = 'border-l-4 border-l-gray-300';
                }

                // Render Customer Page List
                publicList.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl shadow-soft border border-white/60 flex justify-between items-center transition-all hover:translate-x-1 ${statusBg}">
                        <div class="space-y-1 pr-2">
                            <div class="flex items-center gap-2">
                                <span class="font-heading font-bold text-sm tracking-wide text-theme-textDark bg-gray-100 px-2 py-0.5 rounded-md">${item.id}</span>
                                <span class="text-sm font-semibold text-theme-textDark max-w-[140px] truncate">${item.customer}</span>
                            </div>
                            <p class="text-xs text-theme-textMuted truncate max-w-[220px]">${item.detail}</p>
                            <div class="text-[10px] ${item.urgency.includes('เร่ง') ? 'text-rose-500 font-medium' : 'text-gray-400'}">⚡ ${item.urgency}</div>
                        </div>
                        <div class="flex-shrink-0 text-right">
                            ${statusBadge}
                        </div>
                    </div>
                `;

                // Render Admin Management List
                adminList.innerHTML += `
                    <div class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm space-y-3">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="font-heading font-bold text-xs text-purple-700 bg-purple-50 px-2 py-0.5 rounded-md">${item.id}</span>
                                <span class="text-xs font-semibold text-theme-textDark ml-1.5">${item.customer}</span>
                            </div>
                            <button onclick="deleteQueue(${index})" class="text-gray-300 hover:text-red-500 transition-colors text-xs">
                                <i class="fa-regular fa-trash-can"></i> ลบงาน
                            </button>
                        </div>
                        <p class="text-xs text-theme-textMuted border-b border-gray-50 pb-2">${item.detail}</p>
                        <div class="flex justify-between items-center pt-1">
                            <span class="text-[11px] text-gray-400">${item.urgency}</span>
                            <select onchange="updateStatus(${index}, this.value)" class="bg-gray-50 border border-gray-200 text-xs rounded-lg p-1.5 focus:outline-none focus:border-purple-300 text-theme-textDark font-medium">
                                <option value="รอคิว" ${item.status === 'รอคิว' ? 'selected' : ''}>⏳ รอคิว</option>
                                <option value="กำลังดำเนินงาน" ${item.status === 'กำลังดำเนินงาน' ? 'selected' : ''}>👩‍💻 กำลังทำ</option>
                                <option value="ส่งมอบงานแล้ว" ${item.status === 'ส่งมอบงานแล้ว' ? 'selected' : ''}>🎉 สำเร็จ</option>
                            </select>
                        </div>
                    </div>
                `;
            });

            // Sync Static Dashboard Numbers
            document.getElementById('totalQueueCount').innerText = total;
            document.getElementById('pendingQueueCount').innerText = pending;
            document.getElementById('successQueueCount').innerText = success;
        }

        // Action: Create New Card Record
        function createNewQueue(e) {
            e.preventDefault();
            const id = document.getElementById('formQueueId').value.toUpperCase();
            const customer = document.getElementById('formCustomerName').value;
            const detail = document.getElementById('formJobDetails').value;
            const status = document.getElementById('formStatus').value;
            const urgency = document.getElementById('formUrgency').value;

            queueData.push({ id, customer, detail, status, urgency });
            document.getElementById('addQueueForm').reset();
            renderSystem();
            switchTab('customer'); // auto bounce to client look
        }

        // Action: Quick Status Update Dropdown
        function updateStatus(index, newStatus) {
            queueData[index].status = newStatus;
            renderSystem();
        }

        // Action: Delete Card Item
        function deleteQueue(index) {
            if(confirm("คุณต้องการลบคิวงานนี้ออกจากระบบใช่หรือไม่?")) {
                queueData.splice(index, 1);
                renderSystem();
            }
        }

        // Action: Filter Search Client Box
        function searchQueue() {
            const query = document.getElementById('searchTrackInput').value.toLowerCase().trim();
            const publicList = document.getElementById('publicQueueList');
            
            if (query === "") {
                renderSystem();
                return;
            }

            const cards = publicList.getElementsByClassName('glass-card');
            let found = false;

            for(let i=0; i<cards.length; i++) {
                let text = cards[i].textContent.toLowerCase();
                if(text.includes(query)) {
                    cards[i].style.display = "flex";
                    cards[i].classList.add("border-pink-300", "bg-pink-50/20");
                    found = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            if(!found) {
                publicList.innerHTML = `<div class="text-center py-8 text-xs text-theme-textMuted bg-gray-50/50 rounded-2xl border border-dashed border-gray-200">❌ ไม่พบข้อมูลรหัสคิวหรือชื่อลูกค้านี้ในระบบ</div>`;
            }
        }

        // Screen Tabs Multi-page Router Switcher
        function switchTab(target) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('navCustomerBtn').className = "flex flex-col items-center gap-1 text-white/50 hover:text-white transition-all";
            document.getElementById('navAdminBtn').className = "flex flex-col items-center gap-1 text-white/50 hover:text-white transition-all";

            if (target === 'customer') {
                document.getElementById('customerPage').classList.add('active');
                document.getElementById('navCustomerBtn').className = "flex flex-col items-center gap-1 text-pink-300 transition-all scale-105";
            } else {
                document.getElementById('adminPage').classList.add('active');
                document.getElementById('navAdminBtn').className = "flex flex-col items-center gap-1 text-purple-300 transition-all scale-105";
            }
        }

        // Run Build Render Loop
        renderSystem();
    </script>
</body>
</html>
